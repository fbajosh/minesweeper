name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
      DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
      DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
      DEPLOY_TARGET_DIR: ${{ secrets.DEPLOY_TARGET_DIR }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Validate deploy configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in \
            DEPLOY_SSH_HOST \
            DEPLOY_SSH_USER \
            DEPLOY_SSH_KEY \
            DEPLOY_SSH_KNOWN_HOSTS \
            DEPLOY_TARGET_DIR
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Set build version
        shell: bash
        run: |
          set -euo pipefail
          printf 'VITE_BUILD_VERSION=%s\n' "$(date -u +'%y%m%d.%H%M%S')" >> "$GITHUB_ENV"

      - name: Build site
        run: npm run build

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/deploy_key"
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/deploy_key" "$HOME/.ssh/known_hosts"

      - name: Sync dist to VM
        shell: bash
        run: |
          set -euo pipefail
          port="${DEPLOY_SSH_PORT:-22}"
          ssh_args=(
            -i "$HOME/.ssh/deploy_key"
            -p "$port"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          ssh "${ssh_args[@]}" "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" "mkdir -p \"$DEPLOY_TARGET_DIR\""
          rsync -az --delete --omit-dir-times --no-perms --no-owner --no-group \
            -e "ssh ${ssh_args[*]}" \
            dist/ "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST:$DEPLOY_TARGET_DIR/"
